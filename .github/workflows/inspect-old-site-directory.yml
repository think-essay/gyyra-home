name: Inspect Old Site Directory

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Load deployment key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Trust the server host key
        env:
          SERVER_KNOWN_HOSTS: ${{ secrets.SERVER_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Inspect references without changing the server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" '
            set -eu
            old_path=/www/wwwroot/gyyra.cn
            printf "OLD_DIRECTORY_EXISTS="
            test -d "$old_path" && echo yes || echo no
            if test -d "$old_path"; then
              du -sh "$old_path"
              find "$old_path" -mindepth 1 -maxdepth 1 -printf "%f\n" | sort
            fi
            echo "NGINX_REFERENCES:"
            nginx -T 2>&1 | grep -F "$old_path" || true
            echo "PANEL_VHOST_REFERENCES:"
            grep -R -n -F "$old_path" /www/server/panel/vhost/nginx /www/server/panel/vhost/rewrite 2>/dev/null || true
            echo "CRON_REFERENCES:"
            crontab -l 2>/dev/null | grep -F "$old_path" || true
          '
