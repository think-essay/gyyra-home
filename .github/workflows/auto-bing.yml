name: Auto Update Bing Images

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
  push:
    branches: [gh-pages, main, master]
  pull_request:
    branches: [gh-pages, main, master]

permissions:
  contents: write

jobs:
  update-bing-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Bing image list
        run: node assets/js/bing.js

      - name: Commit generated image list
        id: commit
        uses: EndBug/add-and-commit@v9
        with:
          add: assets/json/images.js
          message: "chore: update Bing images"
          github_token: ${{ secrets.GH_TOKEN }}

      - name: Deploy updated Bing images
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh workflow run deploy-server.yml --ref main
