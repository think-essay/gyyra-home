name: Archive Legacy Site Config

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Load deployment key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Trust the server host key
        env:
          SERVER_KNOWN_HOSTS: ${{ secrets.SERVER_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Disable legacy virtual-host configuration safely
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" '
            set -eu
            old_path=/www/wwwroot/gyyra.cn
            config_dir=/www/server/panel/vhost/nginx
            backup_dir=/www/wwwroot/.gyyra-legacy-config-backup-$(date +%Y%m%d%H%M%S)
            mkdir -p "$backup_dir"
            moved=false

            for config in "$config_dir"/*.conf; do
              test -f "$config" || continue
              grep -Fq "$old_path" "$config" || continue
              if grep -Eq "server_name[[:space:]].*www[.]gyyra[.]cn" "$config"; then
                echo LEGACY_CONFIG_ARCHIVED=false
                exit 1
              fi
              mv "$config" "$backup_dir/"
              moved=true
            done

            if test "$moved" = false; then
              rmdir "$backup_dir"
              echo LEGACY_CONFIG_ARCHIVED=false
              exit 1
            fi

            if ! nginx -t >/dev/null 2>&1; then
              mv "$backup_dir"/*.conf "$config_dir/"
              rmdir "$backup_dir"
              echo LEGACY_CONFIG_ARCHIVED=false
              exit 1
            fi

            /etc/init.d/nginx reload
            echo LEGACY_CONFIG_ARCHIVED=true
          '
